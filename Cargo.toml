[package]
name = "byte-table"
version = "1.0.0"
edition = "2021"
rust-version = "1.91"
license = "MIT"
authors = ["Joshua Booth <joshua.n.booth@gmail.com>"]
description = "High-performance 256-length array indexed by u8"
repository = "https://github.com/jnbooth/byte-table"
